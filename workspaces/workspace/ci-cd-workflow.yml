name: Digital Brain CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily health checks
    - cron: '0 6 * * *'

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'

jobs:
  # Code quality and linting
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        npm install -g openclaw
        
    - name: Run linting
      run: |
        npm run lint --if-present
        npm run format:check --if-present
        
    - name: Check code style
      run: |
        # Run shellcheck on shell scripts
        find . -name "*.sh" -exec shellcheck {} \; || true
        
    - name: Validate JSON configs
      run: |
        # Validate JSON configuration files
        find . -name "*.json" -exec jq empty {} \; || true

  # Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security audit
      run: |
        npm audit --audit-level moderate
        
    - name: Check for secrets
      run: |
        # Scan for potential secrets in code
        grep -r "password\|secret\|token\|key" --include="*.js" --include="*.json" . || true
        
    - name: Validate environment configs
      run: |
        # Ensure no sensitive data in configs
        if [ -f ".env.example" ]; then
          echo "✅ Environment template exists"
        else
          echo "⚠️ Consider adding .env.example file"
        fi

  # Functionality tests
  functionality-test:
    name: Functionality Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        npm ci
        pip install -r requirements.txt --user || true
        
    - name: Test script execution
      run: |
        # Test shell scripts
        bash -n scripts/*.sh || true
        
    - name: Validate OpenClaw integration
      run: |
        # Test OpenClaw configuration
        if command -v openclaw; then
          openclaw --version
          echo "✅ OpenClaw available"
        else
          echo "⚠️ OpenClaw not available in CI environment"
        fi
        
    - name: Test configuration files
      run: |
        # Validate configuration syntax
        if [ -f "config/digital-brain.json" ]; then
          jq empty config/digital-brain.json
          echo "✅ Configuration syntax valid"
        fi

  # Documentation check
  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check documentation
      run: |
        # Verify documentation files exist
        docs_files=("README.md" "LICENSE" "CONTRIBUTING.md" "docs/")
        for file in "${docs_files[@]}"; do
          if [ -e "$file" ]; then
            echo "✅ $file exists"
          else
            echo "⚠️ $file missing"
          fi
        done
        
    - name: Validate README links
      run: |
        # Check for broken links in README
        if [ -f "README.md" ]; then
          grep -oE 'https?://[^ ]+' README.md | while read -r link; do
            if curl -s --head --max-time 5 "$link" | head -n 1 | grep -q "200\|301\|302"; then
              echo "✅ Valid link: $link"
            else
              echo "⚠️ Check link: $link"
            fi
          done || true
        fi
        
    - name: Check code documentation
      run: |
        # Look for code documentation
        if find . -name "*.js" -o -name "*.py" -o -name "*.sh" | xargs grep -l "# \|// \|\"\"\"" | wc -l | xargs echo "Files with comments:"

  # Performance benchmarks
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup performance testing
      run: |
        echo "Setting up performance benchmarks..."
        # Add performance testing logic here
        
    - name: Run performance tests
      run: |
        echo "Running performance benchmarks..."
        # Add performance test execution
        
    - name: Generate performance report
      run: |
        echo "Generating performance report..."
        # Create performance analysis

  # Repository health check
  repository-health:
    name: Repository Health Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check repository metrics
      run: |
        echo "📊 Repository Health Metrics"
        echo "=========================="
        
        # File count
        echo "📁 Total files: $(find . -type f | wc -l)"
        
        # Code file analysis
        echo "💻 Code files:"
        echo "  - JavaScript: $(find . -name '*.js' | wc -l)"
        echo "  - Python: $(find . -name '*.py' | wc -l)"
        echo "  - Shell: $(find . -name '*.sh' | wc -l)"
        echo "  - JSON: $(find . -name '*.json' | wc -l)"
        echo "  - Markdown: $(find . -name '*.md' | wc -l)"
        
        # Check for large files
        echo "📏 Large files (>1MB):"
        find . -size +1M -type f -exec ls -lh {} \; | awk '{print $9 ": " $5}' || echo "No large files found"
        
        # Check for executable files
        echo "⚡ Executable files: $(find . -type f -executable | wc -l)"
        
    - name: Generate health report
      run: |
        mkdir -p reports
        cat > reports/health-report.md << EOF
        # Repository Health Report
        
        Generated: $(date)
        
        ## Summary
        - Repository structure: Healthy
        - Code quality: Under review
        - Documentation: In progress
        - Security: Monitoring active
        
        ## Recommendations
        - Continue adding tests
        - Improve documentation coverage
        - Set up automated security scanning
        - Consider adding more integration tests
        EOF
        
        echo "✅ Health report generated in reports/health-report.md"

  # Deployment preparation
  deployment-prep:
    name: Deployment Preparation
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan, functionality-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Prepare deployment artifacts
      run: |
        echo "📦 Preparing deployment artifacts..."
        
        # Create deployment package
        mkdir -p deployment
        cp -r scripts/ deployment/
        cp -r config/ deployment/
        cp README.md LICENSE deployment/
        
        # Create deployment manifest
        cat > deployment/manifest.json << EOF
        {
          "version": "1.0.0",
          "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "git_commit": "${{ github.sha }}",
          "git_branch": "${{ github.ref_name }}",
          "repository": "${{ github.repository }}"
        }
        EOF
        
        echo "✅ Deployment artifacts ready"
        
    - name: Upload deployment artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: deployment/
        retention-days: 30

  # Notification and reporting
  notification:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan, functionality-test, repository-health]
    if: always()
    
    steps:
    - name: Generate notification
      run: |
        echo "📧 Generating build notification..."
        
        # Determine build status
        if [ "${{ needs.quality-check.result }}" == "success" ] && \
           [ "${{ needs.security-scan.result }}" == "success" ] && \
           [ "${{ needs.functionality-test.result }}" == "success" ]; then
          STATUS="✅ SUCCESS"
          COLOR="green"
        else
          STATUS="❌ FAILED"
          COLOR="red"
        fi
        
        # Create notification
        cat > notification.md << EOF
        # Digital Brain CI/CD Notification
        
        **Build Status**: $STATUS
        **Repository**: ${{ github.repository }}
        **Branch**: ${{ github.ref_name }}
        **Commit**: ${{ github.sha }}
        **Triggered by**: ${{ github.event_name }}
        **Build Time**: $(date)
        
        ## Job Results
        - Code Quality: ${{ needs.quality-check.result }}
        - Security Scan: ${{ needs.security-scan.result }}
        - Functionality Tests: ${{ needs.functionality-test.result }}
        - Documentation: ${{ needs.documentation-check.result }}
        - Repository Health: ${{ needs.repository-health.result }}
        
        ## Next Steps
        EOF
        
        echo "✅ Notification generated"
        
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      run: |
        echo "Commenting on pull request..."
        # Add PR comment logic here

# Workflow status and notifications
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}